# AeroSpace config
# Dotfile: ~/_Projects/.dotfiles/aerospace/.aerospace.toml
# Symlink: ~/.aerospace.toml
#
# Modifier convention:
#   Hyper       = ctrl+cmd+alt   (3 modifiers, wysyłane przez Caps Lock via Karabiner)
#   Hyper+Shift = ctrl+cmd+alt+shift  (fizyczny Shift + Caps)
#
# Tap Caps     = Escape
# Hold Caps    = Hyper
# Dzięki temu omijamy konflikty z Polish Pro (alt+l=ł, alt+a=ą, itd.) — Aerospace
# nigdy nie używa samego alt.

after-login-command = []

# JankyBorders (kolorowa ramka aktywnego okna) działa jako osobny brew service:
#   brew services start borders
# Config: ~/.config/borders/bordersrc (stowowane z dotfiles/borders/)

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    inner.vertical   = 10
    outer.left       = 10
    outer.bottom     = 10
    outer.top        = 10
    outer.right      = 10

# ─── Main mode ──────────────────────────────────────────────────────────────
[mode.main.binding]

    # Layouts (Hyper + slash/comma)
    ctrl-cmd-alt-slash = 'layout tiles horizontal vertical'
    ctrl-cmd-alt-comma = 'layout accordion horizontal vertical'

    # Focus (Hyper + h/j/k/l)
    ctrl-cmd-alt-h = 'focus left'
    ctrl-cmd-alt-j = 'focus down'
    ctrl-cmd-alt-k = 'focus up'
    ctrl-cmd-alt-l = 'focus right'

    # Move focused window (Hyper + Shift + h/j/k/l)
    ctrl-cmd-alt-shift-h = 'move left'
    ctrl-cmd-alt-shift-j = 'move down'
    ctrl-cmd-alt-shift-k = 'move up'
    ctrl-cmd-alt-shift-l = 'move right'

    # Resize smart (Aerospace wybiera oś automatycznie)
    ctrl-cmd-alt-minus = 'resize smart -50'
    ctrl-cmd-alt-equal = 'resize smart +50'

    # Rebalans po zamknięciu okna (AeroSpace nie robi tego automatycznie).
    # flatten najpierw usuwa puste kontenery po zamkniętych oknach,
    # bez tego samotne okno zostałoby ściśnięte na boku workspace.
    ctrl-cmd-alt-b = ['flatten-workspace-tree', 'balance-sizes']

    # Resize po konkretnej osi (strzałki)
    ctrl-cmd-alt-left  = 'resize width -50'
    ctrl-cmd-alt-right = 'resize width +50'
    ctrl-cmd-alt-up    = 'resize height -50'
    ctrl-cmd-alt-down  = 'resize height +50'

    # Switch workspace (Hyper + cyfra). Prefiks cyfry → sortowanie alfabetyczne w menu.
    ctrl-cmd-alt-1 = 'workspace 1.Hub'
    ctrl-cmd-alt-2 = 'workspace 2.Dev'
    ctrl-cmd-alt-3 = 'workspace 3.Dev'
    ctrl-cmd-alt-4 = 'workspace 4.Dev'
    ctrl-cmd-alt-5 = 'workspace 5.Comm'
    ctrl-cmd-alt-6 = 'workspace 6.Docs'
    ctrl-cmd-alt-7 = 'workspace 7.Scratch'
    ctrl-cmd-alt-8 = 'workspace 8.Test'
    ctrl-cmd-alt-9 = 'workspace 9.Media'

    # Move focused window to workspace (Hyper + Shift + cyfra)
    ctrl-cmd-alt-shift-1 = 'move-node-to-workspace 1.Hub'
    ctrl-cmd-alt-shift-2 = 'move-node-to-workspace 2.Dev'
    ctrl-cmd-alt-shift-3 = 'move-node-to-workspace 3.Dev'
    ctrl-cmd-alt-shift-4 = 'move-node-to-workspace 4.Dev'
    ctrl-cmd-alt-shift-5 = 'move-node-to-workspace 5.Comm'
    ctrl-cmd-alt-shift-6 = 'move-node-to-workspace 6.Docs'
    ctrl-cmd-alt-shift-7 = 'move-node-to-workspace 7.Scratch'
    ctrl-cmd-alt-shift-8 = 'move-node-to-workspace 8.Test'
    ctrl-cmd-alt-shift-9 = 'move-node-to-workspace 9.Media'

    # Back-and-forth między dwoma ostatnimi workspaces
    ctrl-cmd-alt-tab       = 'workspace-back-and-forth'
    ctrl-cmd-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Service mode (Hyper + ;)
    ctrl-cmd-alt-semicolon = 'mode service'

# ─── Service mode ───────────────────────────────────────────────────────────
[mode.service.binding]
    esc              = ['reload-config', 'mode main']
    r                = ['flatten-workspace-tree', 'mode main']   # reset layout w workspace
    f                = ['layout floating tiling', 'mode main']   # toggle floating/tiling dla okna
    c                = ['close', 'mode main']                    # zamknij aktywne okno
    b                = ['balance-sizes', 'mode main']            # wyrównaj rozmiary w kontenerze
    backspace        = ['close-all-windows-but-current', 'mode main']

    # Join (połącz okno z sąsiadem w kontener)
    ctrl-cmd-alt-shift-h = ['join-with left',  'mode main']
    ctrl-cmd-alt-shift-j = ['join-with down',  'mode main']
    ctrl-cmd-alt-shift-k = ['join-with up',    'mode main']
    ctrl-cmd-alt-shift-l = ['join-with right', 'mode main']

    down       = 'volume down'
    up         = 'volume up'
    shift-down = ['volume set 0', 'mode main']

# ─── Floating rules ─────────────────────────────────────────────────────────
# Żeby znaleźć app-id nowej apki: `aerospace list-windows --all`
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

# Dialogi Open/Save/Preferences/Settings
[[on-window-detected]]
if.window-title-regex-substring = '^(Open|Save|Preferences|Settings)$'
run = 'layout floating'

# Karabiner-Elements Settings — sub-apka, której okna zostają w "hidden" state
# po zamknięciu czerwonym X (bo apka to LSUIElement menu-bar app). AeroSpace
# widzi je dalej jako regular windows i włącza do tilingu → kompresja layoutu.
# Floating odcina je od drzewa tilingu niezależnie od ich stanu widoczności.
[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = 'layout floating'

# System notification dialogs ("App wants to access...", permission prompts).
# Z definicji dialogi, nie chcemy ich w tilingu.
[[on-window-detected]]
if.app-id = 'com.apple.UserNotificationCenter'
run = 'layout floating'

# Ghostty — wymuś tiling. AeroSpace nie ma Ghostty w default terminal-exclusion
# list (tam są tylko WezTerm/Alacritty/iTerm2), więc heurystyka dialog-detection
# ("okno bez fullscreen buttona = dialog") łapie Ghostty i klasyfikuje jako
# floating. Ta reguła obejście heurystyki — wymusza tryb tiling dla każdego
# nowego okna Ghostty.
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'layout tiling'

# Brak reguł auto-assignment — okna otwierają się tam, gdzie aktualnie jesteś.
# Jeśli kiedykolwiek zechcesz pinować konkretną apkę do workspace:
# [[on-window-detected]]
# if.app-id = 'com.apple.mail'
# run = 'move-node-to-workspace 5.Comm'
