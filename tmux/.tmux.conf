# ---------------------------------------------------
# GENERAL SETTINGS
# ---------------------------------------------------

# Start index for window/panel from 1 
set -g base-index 1
setw -g pane-base-index 1

# ---------------------------------------------------
# KEY MAP
# ---------------------------------------------------

# Remap `tmux` prefix to the `<ctrl><a>``
set -g prefix C-a

# ---------------------------------------------------
# PLUGINS
# ---------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Use 'vi' keys 'hjkl' to navigate panes
set -g @plugin 'casonadams/tmux-vi-navigation'

# Tokyo Night theme — spójne z Ghostty + Starship.
# Plugin: https://github.com/janoamaral/tokyo-night-tmux
# Note: ten plugin nie ma CPU/RAM widgetów — jeśli potrzebujesz metryk, odpal btop.
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_transparent 1
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_wbg 0

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Enable mouse scroll
set -g mouse on
